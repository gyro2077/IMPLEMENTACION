# Fase 1 y Fase 2: Aplicaciones y Observabilidad Base
services:
  postgres-app:
    image: postgres:18.3
    container_name: flisol-postgres-app
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_DB_NAME}
      POSTGRES_USER: ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "${APP_DB_PORT}:5432"
    volumes:
      - app_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER} -d ${APP_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  opentelemetry-collector:
    image: otel/opentelemetry-collector-contrib:0.138.0
    container_name: flisol-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./collector/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: flisol-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"

  prometheus:
    image: prom/prometheus:latest
    container_name: flisol-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: flisol-grafana
    restart: unless-stopped
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki:3.3.2
    container_name: flisol-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"

  alloy:
    image: grafana/alloy:v1.6.0
    container_name: flisol-alloy
    restart: unless-stopped
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"

  postgres-metadata:
    image: postgres:18.3
    container_name: flisol-postgres-metadata
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${META_DB_NAME}
      POSTGRES_USER: ${META_DB_USER}
      POSTGRES_PASSWORD: ${META_DB_PASSWORD}
    ports:
      - "${METADATA_DB_PORT}:5432"
    volumes:
      - metadata_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${META_DB_USER} -d ${META_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  target-app:
    build:
      context: ../apps/target-app
      dockerfile: Dockerfile
    container_name: flisol-target-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      APP_DB_HOST: postgres-app
      APP_DB_PORT: 5432
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      JAVA_TOOL_OPTIONS: -javaagent:/opt/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: target-app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://opentelemetry-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      postgres-app:
        condition: service_healthy
      opentelemetry-collector:
        condition: service_started
    ports:
      - "${TARGET_APP_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10

  evidence-server:
    build:
      context: ../apps/evidence-server
      dockerfile: Dockerfile
    container_name: flisol-evidence-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      META_DB_HOST: postgres-metadata
      META_DB_PORT: 5432
      META_DB_NAME: ${META_DB_NAME}
      META_DB_USER: ${META_DB_USER}
      META_DB_PASSWORD: ${META_DB_PASSWORD}
    depends_on:
      postgres-metadata:
        condition: service_healthy
    ports:
      - "${EVIDENCE_SERVER_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  app_db_data:
  metadata_db_data:
